# Historical plague scenario
# Biological parameters representing medieval/historical plague conditions
# Using carcass-based transmission formulation
# ALL rates per day.

# Metadata
name: "historical"
description: "Biological parameters for historical plague outbreaks (14th-17th centuries)"
source: "Historical analysis and paleoepidemiology"
reference: "Estimated from Black Death and subsequent pandemic data"
period: "1347-1700"
time_unit: "day"

# Rat population parameters
r_r: 0.01644     # Higher growth rate (per day, = 6/365)
p: 0.98          # Higher resistance probability (natural selection)
iota: 0.75       # Fecundity multiplier for resistant rats (always fixed, not fitted)
d_r: 0.000411    # Lower baseline death rate (per day, = 0.15/365)

# Disease transmission parameters
beta_r: 1.0      # Higher transmission rate (per day, no control measures)
rho: 2.0         # Infectivity range (lower, different flea species mix)
m_r: 0.04        # Plague resolution rate (per day, ~25 days, virulent strains)
g_r: 0.01        # Very low survival probability (no medical care)
delta_R: 0.2     # Slower carcass decay (per day, cooler climates)

# Human population parameters
r_h: 0.0000822   # Lower growth rate (per day, = 0.03/365)
d_h: 0.000219    # Very high death rate (per day, = 0.08/365)
beta_h: 0.02     # Higher infection rate (close quarters, poor hygiene, per day)
beta_I: 0.03     # Higher human-to-human transmission (pneumonic plague, per day)
m_h: 0.08        # Slower disease progression (per day, ~12.5 days)
g_h: 0.05        # Very low survival probability (no antibiotics)

# Spatial parameters
mu_r: 0.0000548  # Lower movement (per day, = 0.02/365)

# Notes
notes: |
  These parameters attempt to capture conditions during the major
  historical plague pandemics, particularly:

  - The Black Death (1347-1351)
  - The Second Pandemic (14th-19th centuries)
  - Pre-antibiotic medicine
  - Medieval urban conditions
  - Little Ice Age climate

  Key historical factors:
  - No medical interventions
  - Poor sanitation and hygiene
  - Different Yersinia pestis strains
  - Slower transportation networks
  - Cooler climates slowing carcass decay
  - Higher human-to-human transmission (pneumonic plague)

  All rates are per day.
